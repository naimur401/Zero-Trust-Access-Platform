<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#f0f4f8" stroke="#1e40af" stroke-width="2"/>
  
  <!-- Outer ring - represents continuous verification -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="#3b82f6" stroke-width="3" opacity="0.3"/>
  
  <!-- Shield shape - represents security -->
  <path d="M 100 40 L 140 60 L 140 100 Q 100 140 100 140 Q 100 140 60 100 L 60 60 Z" 
        fill="#3b82f6" stroke="#1e40af" stroke-width="2"/>
  
  <!-- Checkmark inside shield - represents trust -->
  <path d="M 85 105 L 95 115 L 115 85" 
        fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Circular arrows around shield - represents zero trust (verify always) -->
  <g stroke="#1e40af" stroke-width="2.5" fill="none" stroke-linecap="round">
    <!-- Top arrow -->
    <path d="M 100 25 A 75 75 0 0 1 155 45" marker-end="url(#arrowhead)"/>
    <!-- Right arrow -->
    <path d="M 165 100 A 75 75 0 0 1 155 155" marker-end="url(#arrowhead)"/>
    <!-- Bottom arrow -->
    <path d="M 100 175 A 75 75 0 0 1 45 155" marker-end="url(#arrowhead)"/>
    <!-- Left arrow -->
    <path d="M 35 100 A 75 75 0 0 1 45 45" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#1e40af"/>
    </marker>
  </defs>
  
  <!-- Text -->
  <text x="100" y="165" font-family="Arial, sans-serif" font-size="14" font-weight="bold" 
        text-anchor="middle" fill="#1e40af">ZERO TRUST</text>
</svg>
